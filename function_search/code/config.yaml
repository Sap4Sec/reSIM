# Function Search Pipeline Configuration

# Base paths
base_path: "/home/jovyan/work/reSAFE/reSAFE_code/"
db_name: "bincorp"

# Experiment settings
pool_size: 5000  # Set to null for no pool constraint
search_depths: [30, 50, 100, 200]  # K values for reranking
batch_size: 50  # Inference batch size 

# GPU configuration
gpus: [0, 1]  # List of GPU IDs to use

# Bi-encoder models to evaluate
bfs_models:
  - "CLAP"
  - "BINBERT"
  - "JTRANS"
  - "TREX"
  - "PALMTREE"
  - "SAFE"
  - "GEMINI"

# Reranker configurations
rerankers:
  reBERT:
    name: "reBERT_marginloss_finetuning_10_epochs_1e-05_lr"
    model_path: "reranker/finetuned_models/reBERT/bincorp/reBERT_marginloss_finetuning_10_epochs_1e-05_lr/checkpoint-51790"
    tokenizer_path: "tokenizer"
    max_length: 512
    
  reDEEP:
    name: "reDEEP_marginloss_finetuning_1_epochs_0.0001_lr"
    model_path: "reranker/finetuned_models/reDEEP/bincorp/reDEEP_marginloss_finetuning_1_epochs_0.0001_lr/checkpoint-10357"
    tokenizer_path: null  # Uses model's tokenizer
    max_length: 2048

# Output directory structure
output:
  base_dir: "refactored_code/function_search/search_results"
  bfs_subdir: "BFS"
  pools_subdir: "POOLS_FOR_TESTING"

# Data paths (relative to base_path)
data:
  pandas_dataset_dir: "reranker/pandas_dataset_from_{db_name}/POOLS_FOR_TESTING"
  embeddings_subdir: "embeddings"
  models_dir: "models"  # Directory containing bi-encoder models (SAFE, JTRANS, etc.)

