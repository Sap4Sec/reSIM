# Function Search Pipeline Configuration

# Base paths
base_path: "/app/vol/reSAFE_code"
db_name: "bincorp"

# Experiment settings
pool_size: 5000  # Set to null for no pool constraint
search_depths: [30, 50, 100, 200]  # K values for reranking
batch_size: 50  # Inference batch size 

# GPU configuration
gpus: [4, 5, 6, 7]  # List of GPU IDs to use

# Bi-encoder models to evaluate
bfs_models:
  - "CLAP"

# Reranker configurations
rerankers:
  reDEEP:
    name: "reDEEP_marginloss_finetuning_1_epochs_0.0001_lr"
    model_path: "finetuned_models/reDEEP/checkpoint-10357"
    tokenizer_path: null
    max_length: 2048

# Output directory structure
output:
  base_dir: "function_search/search_results"
  bfs_subdir: "BFS"
  pools_subdir: "POOLS_FOR_TESTING"

# Data paths
data:
  pandas_dataset_dir: "pandas_dataset/pandas_dataset_from_{db_name}/POOLS_FOR_TESTING"
  embeddings_subdir: "embeddings"
  models_dir: "models"

